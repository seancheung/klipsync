<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>首次部署 · 创建管理员 · KlipSync</title>
<link rel="preconnect" href="https://fonts.bunny.net" />
<link href="https://fonts.bunny.net/css?family=geist:300,400,500,600,700|geist-mono:400,500|inter:400,500,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="brand-large">
      <div class="mark">K</div>
      <h1>欢迎使用 KlipSync</h1>
      <div class="sub">这是这台 NAS 首次启动，请创建一个管理员账号来开始使用。</div>
    </div>

    <div class="alert info" style="margin-bottom: var(--s-6);">
      <span class="dot"></span>
      <div class="txt">
        <strong>这是一次性的初始化步骤</strong>
        <small>创建后，只有该管理员账号能新增其他成员；本页之后不再可访问。</small>
      </div>
    </div>

    <form onsubmit="event.preventDefault(); window.location='P-004-workbench.html';">
      <div class="field">
        <label for="u">管理员用户名</label>
        <input class="input" id="u" type="text" placeholder="3–32 字符 · 字母数字下划线" value="sean" />
      </div>
      <div class="field">
        <label for="p">密码</label>
        <input class="input" id="p" type="password" placeholder="至少 8 位" />
        <div class="help">建议：字母 + 数字 + 符号组合，≥ 12 位更安全</div>
      </div>
      <div class="field">
        <label for="p2">确认密码</label>
        <input class="input" id="p2" type="password" placeholder="再输一次" />
      </div>

      <div class="submit-row">
        <button class="btn btn-primary btn-lg" type="submit">创建管理员并进入系统</button>
      </div>
    </form>

    <div class="alt-row">
      需要帮助？<a href="#">查看部署文档</a>
    </div>
  </div>

  <div style="position:fixed; top: var(--s-4); right: var(--s-4);">
    <button class="icon-btn" data-toggle-theme title="切换主题">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
  </div>
</div>
<script src="interactions.js"></script>
</body>
</html>
