services:
  klipsync:
    build:
      context: .
      dockerfile: Dockerfile
    image: klipsync:latest
    container_name: klipsync
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
